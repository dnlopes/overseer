name: CI - Conventions
on:
  pull_request:
    types: [opened, reopened, edited, labeled, unlabeled, synchronize]

concurrency:
  group: pr-semantic-check-${{ github.ref }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  statuses: write
  contents: read

jobs:
  pr_labels:
    name: Labels
    runs-on: ubuntu-latest
    steps:
      - uses: srvaroa/labeler@bf262763a8a8e191f5847873aecc0f29df84f957
        with:
          config_path: .github/labeler-config.yaml
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  semantic_pr:
    needs: pr_labels
    name: Semantic
    uses: dnlopes/Reusable.Workflows/.github/workflows/semantic-pr.yaml@v1
